# ============================================================
# GLIVAC — Nginx site config
# Ubicar en: /etc/nginx/sites-available/glivac.online
# Activar con: ln -s /etc/nginx/sites-available/glivac.online /etc/nginx/sites-enabled/
# SSL gestionado por Certbot (Let's Encrypt)
# ============================================================

# Redirigir HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name glivac.online www.glivac.online;

    # Certbot coloca aquí el challenge de verificación
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://glivac.online$request_uri;
    }
}

# HTTPS principal
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name glivac.online www.glivac.online;

    # ── SSL (Certbot los genera automáticamente) ───────────────────
    ssl_certificate     /etc/letsencrypt/live/glivac.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/glivac.online/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Headers de seguridad ───────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy       "strict-origin" always;
    add_header X-XSS-Protection      "1; mode=block" always;

    # ── Frontend: Vite SPA (archivos estáticos) ────────────────────
    # El build de Vite queda en /opt/glivac/app/dist
    root /opt/glivac/app/dist;
    index index.html;

    # React Router: todas las rutas no encontradas vuelven a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Caché agresiva para assets con hash (Vite los nombra con contenthash)
    location ~* \.(js|css|woff2?|png|jpg|svg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Supabase API Gateway (Kong) ────────────────────────────────
    # El frontend llama a /auth/v1/* y /rest/v1/* que aquí se proxean a Kong
    location /auth/v1/ {
        proxy_pass         http://127.0.0.1:8000/auth/v1/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 300s;
    }

    location /rest/v1/ {
        proxy_pass         http://127.0.0.1:8000/rest/v1/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    location /realtime/v1/ {
        proxy_pass         http://127.0.0.1:8000/realtime/v1/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_read_timeout 86400s;  # WebSocket de larga duración
    }

    # Supabase health check (opcional, para monitoreo)
    location /health {
        proxy_pass http://127.0.0.1:8000;
        access_log off;
    }
}
